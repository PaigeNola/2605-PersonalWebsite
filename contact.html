<!doctype html>
<html lang="en">
  <link rel="stylesheet" href="contact.css" />
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Connect with Paige!</title>
  </head>
  <body>
    <nav>
      <a href="home.html">HOME</a>
      <a href="about.html">ABOUT</a>
      <a href="portfolio.html">PORTFOLIO</a>
      <a href="contact.html">CONNECT</a>
    </nav>

    <h1>Connect with Paige!</h1>
    <img
      src="images/standing_smirk.jpg"
      alt="Paige standing in front of yellow-orange background smirking wearing a white dress shirt with black dinosaurs on it, red pants, and yellow dress shoes"
      class="center"
    />

    <form action="response.html" id="form">
      <label for="name">Name</label>
      <input type="text" name="name" />
      <br />
      <label for="email">Email</label>
      <input type="text" name="email" />
      <br />
      <label for="message_type">I'm looking to</label>
      <select>
        <option placeholder="">Choose one</option>
        <option value="gig">Book Paige for a gig</option>
        <option value="lessons">Inquire about lessons with Paige</option>
        <option value="connect">Introduce myself</option>
        <option value="other">Another reason</option>
      </select>
      <br />
      <label for="message">Message</label>
      <textarea
        type="text"
        name="message"
        placeholder="Type your message here"
      ></textarea>
      <br />
      <button class="btn" type="submit">Send to Paige!</button>
    </form>
  </body>
</html>
